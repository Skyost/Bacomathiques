name: bacomathiques
description: Cours gratuits pour réviser les maths au lycée !
version: 3.0.6+56
homepage: https://bacomathiqu.es
publish_to: none

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  url_launcher: ^6.3.2
  jovial_svg: ^1.1.29
  share_plus: ^13.1.0
  rate_my_app: ^2.4.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  flutter_layout_grid: ^2.0.8
  flutter_widget_from_html_core: ^0.17.2
  flutter_math_fork: ^0.7.4
  indexed_list_view: ^4.0.0
  flutter_riverpod: ^3.3.1
  html: ^0.15.6
  syntax_highlight: ^0.4.0
  collection: ^1.19.1
  firebase_crashlytics: ^5.2.2
  firebase_core: ^4.9.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: FuturaBT
      fonts:
        - asset: assets/fonts/FuturaBT-Medium.ttf
    - family: Handlee
      fonts:
        - asset: assets/fonts/Handlee-Regular.ttf
    - family: Monaco
      fonts:
        - asset: assets/fonts/Monaco-Regular.ttf
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/languages/
